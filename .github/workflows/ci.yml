name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build

      - name: Lint
        run: ruff check src tests scripts

      - name: Security scan
        run: bandit -r src/tktop/ scripts/ -q

      - name: Test
        run: pytest -q

      - name: Build distributions
        run: python -m build

      - name: Smoke-test wheel install
        if: matrix.python-version == '3.10'
        run: |
          python -m venv /tmp/tktop-wheel-smoke
          /tmp/tktop-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/tktop-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/tktop-wheel-smoke/bin/tktop --help
